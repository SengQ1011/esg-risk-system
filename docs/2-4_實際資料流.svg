<svg xmlns="http://www.w3.org/2000/svg" width="1480" height="880" viewBox="0 0 1480 880"><defs><marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#94A3B8"/></marker></defs><rect width="1480" height="880" fill="#FFFFFF"/><rect x="0" y="0" width="1480" height="70" rx="0" ry="0" fill="#1B2A4A"/><rect x="0" y="66" width="1480" height="4" rx="0" ry="0" fill="#D97706"/><text x="40" y="38" font-family="Noto Sans CJK TC" font-size="27" fill="#FFFFFF" font-weight="bold" text-anchor="start">實際資料流</text><text x="40" y="58" font-family="Noto Sans CJK TC" font-size="14" fill="#9DB2D6" font-weight="normal" text-anchor="start" letter-spacing="0.3">Actual Data Flow（已校正為實際實作內容）</text><text x="1440" y="44" font-family="Noto Sans CJK TC" font-size="15" fill="#C9D6EC" font-weight="normal" text-anchor="end">資料來源 → M1/M2 → M3 → M4 → 輸出</text><text x="155.0" y="96" font-family="Noto Sans CJK TC" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">①  資料來源</text><line x1="40" y1="108" x2="270" y2="108" stroke="#E2E8F0" stroke-width="2"/><text x="415.0" y="96" font-family="Noto Sans CJK TC" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">②  抽取與評分</text><line x1="300" y1="108" x2="530" y2="108" stroke="#E2E8F0" stroke-width="2"/><text x="675.0" y="96" font-family="Noto Sans CJK TC" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">③  漂綠偵測</text><line x1="560" y1="108" x2="790" y2="108" stroke="#E2E8F0" stroke-width="2"/><text x="985.0" y="96" font-family="Noto Sans CJK TC" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">④  透明評分引擎</text><line x1="830" y1="108" x2="1140" y2="108" stroke="#E2E8F0" stroke-width="2"/><text x="1320.0" y="96" font-family="Noto Sans CJK TC" font-size="15" fill="#1E293B" font-weight="bold" text-anchor="middle">⑤  輸出</text><line x1="1190" y1="108" x2="1450" y2="108" stroke="#E2E8F0" stroke-width="2"/><rect x="40" y="150" width="230" height="96" rx="9" ry="9" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.7"/><text x="55" y="176" font-family="Noto Sans CJK TC" font-size="14" fill="#0F766E" font-weight="bold" text-anchor="start">永續報告書 PDF</text><text x="55" y="200" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">MOPS 公開資訊</text><text x="55" y="218" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">觀測站下載</text><rect x="40" y="470" width="230" height="96" rx="9" ry="9" fill="#F0FDFA" stroke="#0F766E" stroke-width="1.7"/><text x="55" y="496" font-family="Noto Sans CJK TC" font-size="14" fill="#0F766E" font-weight="bold" text-anchor="start">負面新聞</text><text x="55" y="520" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">新聞 API 爬取</text><text x="55" y="538" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">Google News RSS</text><rect x="300" y="138" width="230" height="132" rx="9" ry="9" fill="#FFFFFF" stroke="#2563EB" stroke-width="1.7"/><rect x="300" y="138" width="230" height="32" rx="9" ry="9" fill="#2563EB"/><rect x="300" y="154" width="230" height="16" rx="8" ry="8" fill="#2563EB"/><text x="314" y="160" font-family="Noto Sans CJK TC" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="start">M1</text><text x="346" y="160" font-family="Noto Sans CJK TC" font-size="13.5" fill="#FFFFFF" font-weight="bold" text-anchor="start">指標抽取</text><text x="315" y="192" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">Gemini 讀報告書</text><text x="315" y="211" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">GRI 索引定位頁碼</text><text x="315" y="230" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">PyMuPDF bbox 抽取</text><text x="315" y="249" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">→ 量化指標 + 宣稱文字</text><rect x="300" y="458" width="230" height="120" rx="9" ry="9" fill="#FFFFFF" stroke="#D97706" stroke-width="1.7"/><rect x="300" y="458" width="230" height="32" rx="9" ry="9" fill="#D97706"/><rect x="300" y="474" width="230" height="16" rx="8" ry="8" fill="#D97706"/><text x="314" y="480" font-family="Noto Sans CJK TC" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="start">M2</text><text x="346" y="480" font-family="Noto Sans CJK TC" font-size="13.5" fill="#FFFFFF" font-weight="bold" text-anchor="start">新聞事件評分</text><text x="315" y="512" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">Gemini 分類嚴重度</text><text x="315" y="531" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">ERS = 強度 × 時間衰減</text><text x="315" y="550" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">近期事件權重更高</text><rect x="560" y="300" width="230" height="150" rx="9" ry="9" fill="#FFFFFF" stroke="#DC2626" stroke-width="1.7"/><rect x="560" y="300" width="230" height="32" rx="9" ry="9" fill="#DC2626"/><rect x="560" y="316" width="230" height="16" rx="8" ry="8" fill="#DC2626"/><text x="574" y="322" font-family="Noto Sans CJK TC" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="start">M3</text><text x="606" y="322" font-family="Noto Sans CJK TC" font-size="13.5" fill="#FFFFFF" font-weight="bold" text-anchor="start">漂綠偵測</text><text x="575" y="354" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">報告宣稱 vs</text><text x="575" y="373" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">同份報告量化數據</text><text x="575" y="392" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">Gemini 比對矛盾</text><text x="575" y="411" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">→ 漂綠旗標 + 矛盾清單</text><text x="575" y="430" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">（含 PDF 來源頁）</text><rect x="830" y="138" width="310" height="510" rx="10" ry="10" fill="#F0FDF7" stroke="#059669" stroke-width="1.9"/><rect x="830" y="138" width="310" height="36" rx="10" ry="10" fill="#059669"/><rect x="830" y="156" width="310" height="18" rx="8" ry="8" fill="#059669"/><text x="846" y="162" font-family="Noto Sans CJK TC" font-size="15" fill="#FFFFFF" font-weight="bold" text-anchor="start">M4</text><text x="882" y="162" font-family="Noto Sans CJK TC" font-size="14" fill="#FFFFFF" font-weight="bold" text-anchor="start">透明評分引擎（純 Python）</text><rect x="846" y="190" width="278" height="54" rx="7" ry="7" fill="#FFFFFF" stroke="#BBF0D6" stroke-width="1.4"/><rect x="846" y="190" width="5" height="54" rx="2" ry="2" fill="#059669"/><text x="860" y="212" font-family="Noto Sans CJK TC" font-size="13.5" fill="#059669" font-weight="bold" text-anchor="start">1. 指標正規化</text><text x="860" y="232" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="normal" text-anchor="start">GRI/SASB；越低越好／越高越好方向處理</text><rect x="846" y="256" width="278" height="72" rx="7" ry="7" fill="#FFFFFF" stroke="#BBF0D6" stroke-width="1.4"/><rect x="846" y="256" width="5" height="72" rx="2" ry="2" fill="#059669"/><text x="860" y="278" font-family="Noto Sans CJK TC" font-size="13.5" fill="#059669" font-weight="bold" text-anchor="start">2. E / S / G 加權</text><text x="860" y="298" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="normal" text-anchor="start">E 40%　S 30%　G 30%</text><text x="860" y="316" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="normal" text-anchor="start">外部 YAML 設定檔可調</text><rect x="846" y="340" width="278" height="54" rx="7" ry="7" fill="#FFFFFF" stroke="#BBF0D6" stroke-width="1.4"/><rect x="846" y="340" width="5" height="54" rx="2" ry="2" fill="#059669"/><text x="860" y="362" font-family="Noto Sans CJK TC" font-size="13.5" fill="#059669" font-weight="bold" text-anchor="start">3. 事件扣分</text><text x="860" y="382" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="normal" text-anchor="start">M2 ERS 分數  +  M3 漂綠旗標</text><rect x="846" y="406" width="278" height="54" rx="7" ry="7" fill="#FFFFFF" stroke="#BBF0D6" stroke-width="1.4"/><rect x="846" y="406" width="5" height="54" rx="2" ry="2" fill="#059669"/><text x="860" y="428" font-family="Noto Sans CJK TC" font-size="13.5" fill="#059669" font-weight="bold" text-anchor="start">4. 可解釋拆解</text><text x="860" y="448" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="normal" text-anchor="start">每個分數回溯 → 指標 · 權重 · PDF 頁碼</text><rect x="1190" y="138" width="250" height="110" rx="9" ry="9" fill="#FBF5FF" stroke="#9333EA" stroke-width="1.7"/><rect x="1190" y="138" width="6" height="110" rx="2" ry="2" fill="#9333EA"/><text x="1210" y="168" font-family="Noto Sans CJK TC" font-size="15" fill="#9333EA" font-weight="bold" text-anchor="start">評分卡</text><text x="1210" y="192" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">總分 + 等級 A/B+/B/B-/C</text><text x="1210" y="211" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">E/S/G 雷達圖</text><rect x="1190" y="300" width="250" height="110" rx="9" ry="9" fill="#FBF5FF" stroke="#9333EA" stroke-width="1.7"/><rect x="1190" y="300" width="6" height="110" rx="2" ry="2" fill="#9333EA"/><text x="1210" y="330" font-family="Noto Sans CJK TC" font-size="15" fill="#9333EA" font-weight="bold" text-anchor="start">警示清單</text><text x="1210" y="354" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">負面新聞（含連結）</text><text x="1210" y="373" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">漂綠矛盾（含 PDF 來源頁）</text><rect x="1190" y="470" width="250" height="110" rx="9" ry="9" fill="#FBF5FF" stroke="#9333EA" stroke-width="1.7"/><rect x="1190" y="470" width="6" height="110" rx="2" ry="2" fill="#9333EA"/><text x="1210" y="500" font-family="Noto Sans CJK TC" font-size="15" fill="#9333EA" font-weight="bold" text-anchor="start">決策建議</text><text x="1210" y="524" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">授信 / 投資 / 核保</text><text x="1210" y="543" font-family="Noto Sans CJK TC" font-size="12.5" fill="#64748B" font-weight="normal" text-anchor="start">三色燈號</text><line x1="270" y1="198" x2="298" y2="198" stroke="#0F766E" stroke-width="2.2" marker-end="url(#arrow)"/><line x1="270" y1="518" x2="298" y2="518" stroke="#0F766E" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 530 250 C 575 270, 545 360, 558 372" fill="none" stroke="#2563EB" stroke-width="2.2" marker-end="url(#arrow)"/><text x="548" y="296" font-family="Noto Sans CJK TC" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="end">M1 輸出：</text><text x="548" y="312" font-family="Noto Sans CJK TC" font-size="11" fill="#2563EB" font-weight="bold" text-anchor="end">宣稱文字 + 指標</text><path d="M 530 200 C 660 200, 700 215, 828 230" fill="none" stroke="#2563EB" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 790 375 C 805 375, 812 375, 828 378" fill="none" stroke="#DC2626" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 530 518 C 660 518, 720 512, 828 512" fill="none" stroke="#D97706" stroke-width="2.2" marker-end="url(#arrow)"/><text x="700" y="470" font-family="Noto Sans CJK TC" font-size="12" fill="#64748B" font-weight="bold" text-anchor="middle">M1 + M2 + M3</text><path d="M 1140 250 C 1162 250, 1168 200, 1188 195" fill="none" stroke="#059669" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 1140 380 C 1162 380, 1168 360, 1188 352" fill="none" stroke="#059669" stroke-width="2.2" marker-end="url(#arrow)"/><path d="M 1140 500 C 1162 500, 1168 520, 1188 522" fill="none" stroke="#059669" stroke-width="2.2" marker-end="url(#arrow)"/><rect x="40" y="680" width="1110" height="150" rx="9" ry="9" fill="#FFFBEB" stroke="#FCD34D" stroke-width="1.6"/><rect x="40" y="680" width="6" height="150" rx="2" ry="2" fill="#D97706"/><text x="62" y="708" font-family="Noto Sans CJK TC" font-size="15" fill="#92400E" font-weight="bold" text-anchor="start">⚠  與原始設計文件的兩處差異（本圖為實際實作）</text><text x="62" y="740" font-family="Noto Sans CJK TC" font-size="13" fill="#78350F" font-weight="bold" text-anchor="start">1.</text><text x="86" y="740" font-family="Noto Sans CJK TC" font-size="13" fill="#78350F" font-weight="normal" text-anchor="start">M3 漂綠偵測：資料來源改為「報告書內部自比對」（報告宣稱 vs 同份報告量化</text><text x="86" y="764" font-family="Noto Sans CJK TC" font-size="13" fill="#78350F" font-weight="normal" text-anchor="start">數據），未串接環境部外部碳排資料庫。</text><text x="62" y="796" font-family="Noto Sans CJK TC" font-size="13" fill="#78350F" font-weight="bold" text-anchor="start">2.</text><text x="86" y="796" font-family="Noto Sans CJK TC" font-size="13" fill="#78350F" font-weight="normal" text-anchor="start">M6 治理層（人工複核 + 對標 S&amp;P / Refinitiv 公開分數）尚未實作。</text><rect x="1170" y="680" width="270" height="150" rx="9" ry="9" fill="#EFF6FF" stroke="#BFD4FF" stroke-width="1.6"/><text x="1188" y="706" font-family="Noto Sans CJK TC" font-size="14" fill="#2563EB" font-weight="bold" text-anchor="start">額外實作功能</text><text x="1188" y="730" font-family="Noto Sans CJK TC" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start">· 通用公司搜尋（任意上市公司）</text><text x="1188" y="750" font-family="Noto Sans CJK TC" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start">· PDF 上傳 / 貼網址自動下載</text><text x="1188" y="770" font-family="Noto Sans CJK TC" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start">· Job 系統 + WebSocket 進度</text><text x="1188" y="790" font-family="Noto Sans CJK TC" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start">· 浮動 PiP 圓點背景進度</text><text x="1188" y="810" font-family="Noto Sans CJK TC" font-size="11.5" fill="#64748B" font-weight="normal" text-anchor="start">· 公司刪除 + 清快取重分析</text></svg>